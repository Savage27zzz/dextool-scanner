services:
  bot:
    build: .
    container_name: dextool-scanner
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    # For local development, mount data directory:
    #   docker run -v ./data:/app/data ...
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
